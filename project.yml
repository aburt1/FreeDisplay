name: FreeDisplay
options:
  bundleIdPrefix: com.freedisplay
  deploymentTarget:
    macOS: "14.0"

targets:
  FreeDisplay:
    type: application
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: FreeDisplay
        excludes:
          - "**/*.md"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.freedisplay.app
        INFOPLIST_KEY_LSUIElement: true
        INFOPLIST_KEY_NSHumanReadableCopyright: "FreeDisplay - Free & Open Source"
        SWIFT_VERSION: "6.0"
        CODE_SIGN_ENTITLEMENTS: FreeDisplay/FreeDisplay.entitlements
        ENABLE_HARDENED_RUNTIME: YES
        # Defaults to ad-hoc so anyone who clones can build with just `xcodebuild`.
        # For a signed/notarized distribution build, override these on the command
        # line (or in a private xcconfig) with your own DEVELOPMENT_TEAM.
        CODE_SIGNING_REQUIRED: NO
        CODE_SIGN_IDENTITY: "-"
        DEVELOPMENT_TEAM: ""
        SWIFT_STRICT_CONCURRENCY: minimal
        SWIFT_OBJC_BRIDGING_HEADER: FreeDisplay/FreeDisplay-Bridging-Header.h
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_NSScreenCaptureUsageDescription: "FreeDisplay needs screen recording permission to show live previews of each display."
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
